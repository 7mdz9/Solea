<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solea — Taste the sun</title>
  <meta name="description" content="A sun-inspired café. Opening May 1, 2026 in Abu Dhabi." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>

  <main class="stage">

    <!-- LOGO: the real Solea brand mark -->
    <div class="logo">
      <svg class="logo-sun" viewBox="0 0 100 50" aria-hidden="true">
        <path d="M 0 50 A 50 50 0 0 1 100 50 Z" fill="currentColor"/>
      </svg>
      <h1 class="logo-wordmark">Solea</h1>
      <p class="logo-tagline"><span>Taste the Sun</span></p>
    </div>

    <!-- BLURB: one line, what Solea is + status -->
    <p class="blurb">A sun-inspired café — coming soon.</p>

    <!-- PRE-ORDERS: eyebrow, countdown, date -->
    <section class="opening" aria-live="polite">
      <p class="eyebrow"><span>Pre-orders Begin</span></p>

      <div class="countdown" id="cd-grid">
        <div class="cd-unit">
          <span class="cd-value" data-unit="days">--</span>
          <span class="cd-label">Days</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="cd-unit">
          <span class="cd-value" data-unit="hours">--</span>
          <span class="cd-label">Hours</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="cd-unit">
          <span class="cd-value" data-unit="minutes">--</span>
          <span class="cd-label">Minutes</span>
        </div>
        <span class="cd-sep" aria-hidden="true">:</span>
        <div class="cd-unit">
          <span class="cd-value" data-unit="seconds">--</span>
          <span class="cd-label">Seconds</span>
        </div>
      </div>
      <p class="cd-launched" id="cd-launched" hidden>The doors are open.</p>

      <p class="date">May 1, 2026<span class="dot">·</span>Abu Dhabi</p>
    </section>

    <!-- CONTACT -->
    <div class="contact">
      <p class="contact-label">For inquiries</p>
      <a class="contact-mail" href="mailto:solea.ad2026@gmail.com?subject=Solea · Inquiry">solea.ad2026@gmail.com</a>
    </div>

  </main>

  <script src="scripts/countdown.js" defer></script>
</body>
</html>
